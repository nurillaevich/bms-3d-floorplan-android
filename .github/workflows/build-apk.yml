name: Build APK

# Builds the tablet kiosk .apk. The 3D card + kiosk page are pulled from the
# integration repo (Abdunazar7/bms-3d-floorplan) so this app always bundles the
# latest published panel — no card source lives here.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      card_ref:
        description: 'Integration git ref to pull the card from'
        default: main

permissions:
  contents: write

env:
  CARD_REPO: Abdunazar7/bms-3d-floorplan
  CARD_REF: ${{ github.event.inputs.card_ref || 'main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull the kiosk page + card from the integration
        run: |
          mkdir -p app/src/main/assets/kiosk
          # Resolve the ref to an immutable commit SHA first, then fetch by SHA.
          # A raw URL pinned to a SHA is never served stale, so the APK can't
          # accidentally bundle a cached older card (the branch cache can lag).
          SHA=$(curl -fsSL -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CARD_REPO}/commits/${CARD_REF}" | jq -r .sha)
          echo "Bundling card from ${CARD_REPO}@${SHA}"
          base="https://raw.githubusercontent.com/${CARD_REPO}/${SHA}"
          curl -fL "$base/standalone/index.html"       -o app/src/main/assets/kiosk/index.html
          curl -fL "$base/dist/ha-3d-floorplan-card.js" -o app/src/main/assets/kiosk/ha-3d-floorplan-card.js
          grep -o "CARD_VERSION[^,;]*" app/src/main/assets/kiosk/ha-3d-floorplan-card.js | head -1 || true
          ls -l app/src/main/assets/kiosk

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Decode the signing keystore
        env:
          SIGNING_P12_BASE64: ${{ secrets.SIGNING_P12_BASE64 }}
        run: |
          # A FIXED signing key so every build shares one certificate and the
          # in-app updater can upgrade in place. The keystore lives only in this
          # secret (never in the repo); decode it here. If the secret is missing,
          # the build falls back to a throwaway debug key (installs fresh, but
          # will NOT update over a previous install).
          if [ -n "$SIGNING_P12_BASE64" ]; then
            echo "$SIGNING_P12_BASE64" | base64 -d > app/signing.p12
            echo "Signing with the fixed key ($(stat -c%s app/signing.p12) bytes)."
          else
            echo "::warning::SIGNING_P12_BASE64 secret is not set — this APK uses a throwaway key and will not update in place. Add it in Settings → Secrets and variables → Actions."
          fi

      - name: Build debug APK
        env:
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Name the APK
        run: cp app/build/outputs/apk/debug/app-debug.apk bms-3d-floorplan.apk

      - uses: actions/upload-artifact@v4
        with:
          name: bms-3d-floorplan-apk
          path: bms-3d-floorplan.apk
          if-no-files-found: error

      - name: Attach APK to the release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Android kiosk APK" || true
          gh release upload "${GITHUB_REF_NAME}" bms-3d-floorplan.apk --clobber
