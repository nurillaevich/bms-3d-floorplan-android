name: Build APK

# Builds the tablet kiosk .apk. The 3D card + kiosk page are pulled from the
# integration repo (Abdunazar7/bms-3d-floorplan) so this app always bundles the
# latest published panel — no card source lives here.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      card_ref:
        description: 'Integration git ref to pull the card from'
        default: main

permissions:
  contents: write

env:
  CARD_REPO: Abdunazar7/bms-3d-floorplan
  CARD_REF: ${{ github.event.inputs.card_ref || 'main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull the kiosk page + card from the integration
        run: |
          mkdir -p app/src/main/assets/kiosk
          # Resolve the ref to an immutable commit SHA first, then fetch by SHA.
          # A raw URL pinned to a SHA is never served stale, so the APK can't
          # accidentally bundle a cached older card (the branch cache can lag).
          #
          # Resolved with git ls-remote, NOT api.github.com: the REST API caps
          # unauthenticated callers at 60 requests/hour per IP and runners share
          # IPs, so that call started returning 403 and failed the build outright.
          # The git protocol has no such cap.
          SHA=$(git ls-remote "https://github.com/${CARD_REPO}" "refs/heads/${CARD_REF}" | cut -f1)
          if [ -z "$SHA" ]; then
            SHA=$(git ls-remote "https://github.com/${CARD_REPO}" "refs/tags/${CARD_REF}" | cut -f1)
          fi
          if [ -z "$SHA" ]; then
            echo "::error::Could not resolve ${CARD_REPO}@${CARD_REF} to a commit"
            exit 1
          fi
          echo "Bundling card from ${CARD_REPO}@${SHA}"
          base="https://raw.githubusercontent.com/${CARD_REPO}/${SHA}"
          curl -fL "$base/standalone/index.html"       -o app/src/main/assets/kiosk/index.html
          curl -fL "$base/dist/ha-3d-floorplan-card.js" -o app/src/main/assets/kiosk/ha-3d-floorplan-card.js
          grep -o "CARD_VERSION[^,;]*" app/src/main/assets/kiosk/ha-3d-floorplan-card.js | head -1 || true
          ls -l app/src/main/assets/kiosk

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Decrypt the signing keystore
        env:
          SIGNING_STORE_KEY: ${{ secrets.SIGNING_STORE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          # A FIXED signing key so every build shares one certificate and the
          # in-app updater can upgrade in place. The keystore is committed
          # AES-encrypted (app/signing.p12.enc) — safe to be public; the short
          # passphrase lives only in the SIGNING_STORE_KEY secret. If it's unset,
          # fall back to a throwaway debug key (installs fresh, no in-place update).
          if [ -z "${SIGNING_STORE_KEY:-}" ]; then
            echo "::warning::SIGNING_STORE_KEY not set — throwaway key, no in-place updates. Add it in Settings → Secrets and variables → Actions."
            exit 0
          fi
          # Strip any whitespace a paste may add, so a stray newline can't break it.
          KEY=$(printf '%s' "$SIGNING_STORE_KEY" | tr -d '[:space:]')
          if ! openssl enc -d -aes-256-cbc -pbkdf2 -iter 200000 \
                 -pass "pass:$KEY" -in app/signing.p12.enc -out app/signing.p12 2>/dev/null; then
            echo "::error::Could not decrypt signing.p12.enc — the SIGNING_STORE_KEY secret is wrong."
            exit 1
          fi
          if keytool -list -keystore app/signing.p12 -storetype PKCS12 \
               -storepass "${SIGNING_PASSWORD:-bms3dfloorplan}" >/dev/null 2>&1; then
            echo "Keystore decrypted and validated."
          else
            echo "::error::Decrypted, but keytool can't open the keystore (unexpected)."
            exit 1
          fi

      - name: Build debug APK
        env:
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          # Emit failures as ::error:: annotations. Raw job logs need an
          # authenticated API call and the step summary isn't exposed either, so
          # without this a compile error is invisible from outside the repo.
          set -o pipefail
          if ! gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log; then
            grep -E "error:|Execution failed|Caused by:|Could not (find|resolve)" /tmp/build.log               | head -25 | while IFS= read -r line; do
                  echo "::error::${line}"
                done
            exit 1
          fi

      - name: Name the APK
        run: cp app/build/outputs/apk/debug/app-debug.apk bms-3d-floorplan.apk

      - uses: actions/upload-artifact@v4
        with:
          name: bms-3d-floorplan-apk
          path: bms-3d-floorplan.apk
          if-no-files-found: error

      - name: Attach APK to the release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Android kiosk APK" || true
          gh release upload "${GITHUB_REF_NAME}" bms-3d-floorplan.apk --clobber
